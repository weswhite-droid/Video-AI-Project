<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video AI Project - Home</title>
    <meta http-equiv="refresh" content="0; url=video-ai-dashboard.html">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #63b3ed;
        }
        p {
            margin-bottom: 30px;
            color: #a0aec0;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        a {
            background: linear-gradient(135deg, #2b6cb0 0%, #3182ce 100%);
            color: white;
            text-decoration: none;
            padding: 15px 25px;
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        a:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 179, 237, 0.4);
        }
        .spinner {
            border: 3px solid rgba(99, 179, 237, 0.1);
            border-top: 3px solid #63b3ed;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Video AI Project Dashboard</h1>
        <div class="spinner"></div>
        <p>Redirecting to dashboard...</p>
        <p style="font-size: 0.9rem; color: #718096;">If not redirected automatically, click below:</p>
        <div class="links">
            <a href="video-ai-dashboard.html">📊 Main Dashboard</a>
            <a href="video-ai-raid-log.html">⚠️ RAID Log</a>
            <a href="video-ai-raci.html">👥 RACI Matrix</a>
            <a href="video-ai-requirements.html">📐 Requirements</a>
        </div>
    </div>
</body>
</html>
